<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dropship · Manual</title>
<meta name="description" content="A no-bullshit dropshipping operating manual — Spain tax detail, a live unit-economics calculator, product validation and tools. EN / ES." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E" />
<style>
  /* ============ TOKENS — Warm Editorial ============ */
  :root {
    --paper:    #f7f4ee;   /* cream page */
    --card:     #fffdf8;   /* raised paper */
    --card-2:   #efe8da;
    --line:     #e3dac9;
    --line-soft:#ece4d5;
    --ink:      #2b2620;   /* warm near-black */
    --muted:    #6b6256;
    --faint:    #9c9180;
    --accent:   #b45309;   /* burnt terracotta */
    --accent-2: #8a3f06;
    --accent-soft:#f3e7d6;
    --pos:      #3f7d54;   /* warm green */
    --pos-soft: #e7f0e6;
    --neg:      #b3402f;   /* warm red */
    --neg-soft: #f6e6e0;
    --warn:     #b45309;
    --warn-soft:#f6ecdb;
    --code-bg:  #f1ebdd;
    --code-fg:  #4a4136;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, "Times New Roman", serif;
    --sans:  -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
    --mono:  ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --nav-h: 60px;
    --sidebar-w: 280px;
    --shadow: 0 18px 44px -26px rgba(60,44,20,.35);
  }
  html[data-theme="dark"] {
    --paper:    #1b1713;   /* warm espresso */
    --card:     #241e18;
    --card-2:   #2c251d;
    --line:     #3a3127;
    --line-soft:#2f281f;
    --ink:      #ece3d4;
    --muted:    #a89c89;
    --faint:    #786d5c;
    --accent:   #e0863f;   /* warm amber, brighter on dark */
    --accent-2: #f0a85e;
    --accent-soft:#33271a;
    --pos:      #6fc08a;
    --pos-soft: #1d2c20;
    --neg:      #e8806f;
    --neg-soft: #2e1c17;
    --warn:     #e0a05a;
    --warn-soft:#2c2113;
    --code-bg:  #15110c;
    --code-fg:  #d8cab0;
    --shadow: 0 20px 50px -28px rgba(0,0,0,.7);
  }

  * { box-sizing: border-box; }
  /* themed, thin scrollbars (replaces the chunky default OS bar) */
  html { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; border: 2px solid var(--paper); background-clip: padding-box; }
  *::-webkit-scrollbar-thumb:hover { background: var(--faint); border-color: var(--paper); background-clip: padding-box; }
  *::-webkit-scrollbar-corner { background: transparent; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } *{ transition:none!important; animation:none!important; } }
  body { margin:0; background:var(--paper); color:var(--ink); font:17px/1.7 var(--sans); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  a { color:var(--accent); text-decoration:none; }
  a:hover { text-decoration:underline; }
  ::selection { background:var(--accent-soft); color:var(--accent-2); }
  :focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:3px; }
  .kicker { font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:.26em; text-transform:uppercase; color:var(--accent); }

  /* ============ NAVBAR ============ */
  .nav {
    position:sticky; top:0; z-index:100; height:var(--nav-h);
    display:flex; align-items:center; gap:16px; padding:0 20px;
    background:color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter:blur(12px) saturate(1.15); border-bottom:1px solid var(--line);
  }
  .hamb {
    background:none; border:1px solid var(--line); color:var(--ink); width:38px; height:36px;
    border-radius:9px; cursor:pointer; font-size:16px; line-height:1; align-items:center; justify-content:center;
    display:none; /* desktop: hidden — collapse lives in the sidebar. Shown on mobile. */
  }
  .hamb:hover { border-color:var(--accent); color:var(--accent); }
  .brand { font-family:var(--serif); font-size:19px; font-weight:600; letter-spacing:.01em; white-space:nowrap; display:flex; align-items:baseline; gap:8px; }
  .brand .em { font-style:italic; color:var(--accent); }
  .tabs { display:flex; gap:4px; margin-left:6px; }
  .tab {
    font-family:var(--sans); font-size:14px; color:var(--muted); padding:8px 12px; border:none; background:none;
    cursor:pointer; border-bottom:2px solid transparent; border-radius:0;
  }
  .tab:hover { color:var(--ink); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
  .spacer { flex:1; }
  .nav-search { background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:9px; padding:8px 12px; font-size:14px; width:180px; font-family:var(--sans); }
  .nav-search::placeholder { color:var(--faint); }
  .seg { display:inline-flex; border:1px solid var(--line); border-radius:9px; overflow:hidden; background:var(--card); }
  .seg button { font-family:var(--sans); font-weight:600; font-size:13px; padding:8px 11px; border:none; background:none; color:var(--muted); cursor:pointer; }
  .seg button.on { background:var(--accent); color:#fff; }
  .icon-btn { background:var(--card); border:1px solid var(--line); color:var(--ink); width:38px; height:36px; border-radius:9px; cursor:pointer; font-size:15px; }
  .icon-btn:hover { border-color:var(--accent); }

  /* ============ HERO ============ */
  .hero { border-bottom:1px solid var(--line); background:
    radial-gradient(1100px 420px at 88% -20%, var(--accent-soft), transparent 62%); }
  .hero-inner { max-width:1140px; margin:0 auto; padding:54px 26px 44px; display:grid; grid-template-columns:1.04fr .96fr; gap:46px; align-items:center; }
  .hero h1 { font-family:var(--serif); font-weight:600; font-size:clamp(2.1rem,4.6vw,3.4rem); line-height:1.06; letter-spacing:-.01em; margin:16px 0 0; }
  .hero h1 .num { color:var(--accent); font-style:italic; }
  .rule { width:64px; height:2px; background:var(--accent); margin:22px 0 18px; border-radius:2px; }
  .hero .lede { color:var(--muted); font-size:1.12rem; line-height:1.6; max-width:48ch; margin:0 0 22px; }
  .hero .meta-row { display:flex; gap:22px; flex-wrap:wrap; font-family:var(--sans); font-size:12px; color:var(--faint); letter-spacing:.02em; }
  .hero .meta-row b { color:var(--accent); font-weight:700; }

  /* ============ CALCULATOR CARD (signature) ============ */
  .calc { background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
  .calc-head { padding:15px 18px 13px; border-bottom:1px solid var(--line); }
  .calc-head .eyebrow { font-family:var(--sans); font-size:10.5px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); }
  .calc-head .ttl { font-family:var(--serif); font-size:1.18rem; margin-top:3px; color:var(--ink); }
  .calc-body { padding:16px 18px 18px; }
  .fields { display:grid; grid-template-columns:1fr 1fr; gap:11px 16px; }
  .fields label { display:flex; flex-direction:column; gap:5px; font-size:12px; color:var(--muted); }
  .fields input { background:var(--paper); border:1px solid var(--line); color:var(--ink); border-radius:9px; padding:9px 11px; font-size:15px; font-family:var(--mono); width:100%; }
  .fields input:focus { border-color:var(--accent); background:var(--card); }
  .readout { margin-top:15px; display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
  .cell { background:var(--paper); border:1px solid var(--line); border-radius:11px; padding:10px 12px; }
  .cell .lbl { font-family:var(--sans); font-size:9.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); }
  .cell .num { font-family:var(--mono); font-size:1.16rem; font-weight:600; margin-top:4px; color:var(--ink); }
  .cell.wide { grid-column:span 3; display:flex; align-items:center; justify-content:space-between; }
  .cell.pos { background:var(--pos-soft); border-color:color-mix(in srgb,var(--pos) 45%,var(--line)); }
  .cell.pos .num { color:var(--pos); }
  .cell.neg { background:var(--neg-soft); border-color:color-mix(in srgb,var(--neg) 45%,var(--line)); }
  .cell.neg .num { color:var(--neg); }
  .verdict { margin-top:13px; padding:12px 14px; border-radius:11px; font-size:13.5px; line-height:1.5; font-weight:500; }
  .verdict.ok { background:var(--pos-soft); border:1px solid color-mix(in srgb,var(--pos) 40%,var(--line)); color:var(--pos); }
  .verdict.bad { background:var(--warn-soft); border:1px solid color-mix(in srgb,var(--warn) 45%,var(--line)); color:var(--accent-2); }
  html[data-theme="dark"] .verdict.bad { color:var(--warn); }

  /* ============ LAYOUT + COLLAPSIBLE SIDEBAR ============ */
  .shell { display:flex; max-width:1140px; margin:0 auto; align-items:flex-start; }
  #sidebar {
    width:var(--sidebar-w); flex-shrink:0; position:sticky; top:var(--nav-h);
    height:calc(100vh - var(--nav-h)); overflow-y:auto; padding:26px 14px 80px; border-right:1px solid var(--line);
  }
  body:not(.sb-open) #sidebar { display:none; }
  #sidebar .toc-h { display:flex; align-items:center; justify-content:space-between; font-family:var(--sans); font-size:10.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--faint); padding:0 4px 0 10px; margin-bottom:12px; }
  #sbCollapse { background:none; border:none; color:var(--faint); cursor:pointer; font-size:15px; line-height:1; padding:4px 6px; border-radius:7px; }
  #sbCollapse:hover { color:var(--accent); background:var(--card); }
  /* reopen tab on the left edge, only when collapsed on desktop */
  #sbReopen {
    display:none; position:fixed; left:0; top:calc(var(--nav-h) + 26px); z-index:70;
    background:var(--card); border:1px solid var(--line); border-left:none; color:var(--muted);
    border-radius:0 10px 10px 0; padding:11px 9px; cursor:pointer; box-shadow:var(--shadow);
    writing-mode:vertical-rl; font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  }
  #sbReopen:hover { color:var(--accent); border-color:var(--accent); }
  body:not(.sb-open) #sbReopen { display:inline-flex; align-items:center; gap:6px; }
  #toc { list-style:none; margin:0; padding:0; font-size:14px; }
  #toc a { display:block; padding:6px 11px; border-radius:8px; color:var(--muted); border-left:2px solid transparent; line-height:1.35; }
  #toc a:hover { color:var(--ink); background:var(--card); text-decoration:none; }
  #toc a.lvl3 { padding-left:24px; font-size:13px; }
  #toc a.active { color:var(--accent); border-left-color:var(--accent); background:var(--accent-soft); font-weight:600; }

  main { flex:1; min-width:0; padding:34px 52px 130px; }
  .doc { max-width:none; }
  body.sb-open main { padding-left:48px; }

  .scrim { display:none; }

  /* ============ MARKDOWN ============ */
  .doc h1 { font-family:var(--serif); font-weight:600; font-size:2.1rem; letter-spacing:-.01em; margin:0 0 .5em; }
  .doc h2 { font-family:var(--serif); font-weight:600; font-size:1.62rem; margin:2.3em 0 .55em; scroll-margin-top:calc(var(--nav-h) + 16px); }
  .doc h2::before { content:""; display:block; width:38px; height:2px; background:var(--accent); border-radius:2px; margin-bottom:.6em; }
  .doc h3 { font-family:var(--serif); font-weight:600; font-size:1.28rem; margin:1.8em 0 .4em; scroll-margin-top:calc(var(--nav-h) + 16px); }
  .doc h4 { font-size:1.04rem; font-weight:700; margin:1.3em 0 .3em; color:var(--muted); }
  .doc p, .doc li { color:var(--ink); }
  .doc em { color:var(--muted); font-style:italic; }
  .doc strong { font-weight:700; }
  .doc a { border-bottom:1px solid color-mix(in srgb,var(--accent) 38%,transparent); }
  .doc hr { border:none; border-top:1px solid var(--line); margin:2.6em 0; }
  .doc code { font-family:var(--mono); font-size:.85em; background:var(--code-bg); color:var(--code-fg); padding:.14em .42em; border-radius:5px; border:1px solid var(--line-soft); }
  .doc pre { background:var(--code-bg); border:1px solid var(--line); border-radius:12px; padding:15px 17px; overflow-x:auto; }
  .doc pre code { background:none; border:none; padding:0; font-size:.86rem; line-height:1.6; color:var(--code-fg); }
  .doc blockquote { margin:1.4em 0; padding:14px 18px; background:var(--warn-soft); border-left:3px solid var(--accent); border-radius:8px; }
  .doc blockquote p { color:var(--accent-2); margin:.3em 0; }
  html[data-theme="dark"] .doc blockquote p { color:var(--warn); }
  .doc blockquote strong { color:var(--accent-2); }
  html[data-theme="dark"] .doc blockquote strong { color:var(--warn); }
  .doc table { border-collapse:collapse; width:100%; display:block; overflow-x:auto; margin:1.4em 0; font-size:.95rem; }
  .doc th, .doc td { border:1px solid var(--line); padding:10px 14px; text-align:left; }
  .doc th { background:var(--card); font-family:var(--sans); font-size:.8rem; font-weight:700; letter-spacing:.03em; text-transform:uppercase; color:var(--muted); }
  .doc tr:nth-child(even) td { background:color-mix(in srgb,var(--card) 55%,transparent); }
  .doc ul, .doc ol { padding-left:1.4em; }
  .doc li { margin:.28em 0; }
  .doc li::marker { color:var(--accent); }
  .doc input[type="checkbox"] { accent-color:var(--accent); margin-right:8px; }

  .toTop { position:fixed; right:22px; bottom:22px; z-index:80; background:var(--accent); color:#fff; border:none; border-radius:11px; padding:11px 14px; font-family:var(--sans); font-weight:600; font-size:13px; cursor:pointer; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .2s; }
  .toTop.show { opacity:1; pointer-events:auto; }
  footer { border-top:1px solid var(--line); padding:28px; text-align:center; color:var(--faint); font-size:12.5px; font-family:var(--sans); }
  #loading { color:var(--muted); padding:40px 0; }
  .err { background:var(--warn-soft); border:1px solid var(--accent); color:var(--accent-2); padding:16px; border-radius:10px; }

  /* ============ MOBILE ============ */
  @media (max-width:980px){ .hero-inner{ grid-template-columns:1fr; gap:30px; } }
  @media (max-width:820px){
    .hamb { display:inline-flex; }
    #sbReopen { display:none !important; }
    .brand .em { display:none; }
    .tabs { display:none; }
    .nav-search { display:none; }
    .nav { gap:10px; padding:0 14px; }
    main { padding:24px 18px 100px; }
    body.sb-open main { padding-left:18px; }
    .hero-inner { padding:36px 18px 30px; }
    .fields, .readout { grid-template-columns:1fr 1fr; }
    .cell.wide { grid-column:span 2; }
    #sidebar { position:fixed; left:0; top:var(--nav-h); z-index:95; width:286px; background:var(--paper); box-shadow:var(--shadow); }
    /* mobile: show doc tabs inside the open drawer (higher specificity beats the base hide below) */
    body.sb-open #sidebar .toc-tabs { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
    body.sb-open .scrim { display:block; position:fixed; inset:var(--nav-h) 0 0 0; background:rgba(20,12,0,.32); z-index:94; }
  }
  #sidebar .toc-tabs { display:none; }
  #sidebar .toc-tabs .tab { border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-size:13px; }
  #sidebar .toc-tabs .tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
</style>
</head>
<body>

<nav class="nav">
  <button class="hamb" id="hamb" aria-label="Toggle contents" title="Contents">☰</button>
  <div class="brand">Dropship <span class="em">· Manual</span></div>
  <div class="tabs" id="tabs"></div>
  <span class="spacer"></span>
  <input class="nav-search" id="search" type="search" />
  <div class="seg" id="lang"><button data-lang="en">EN</button><button data-lang="es">ES</button></div>
  <button class="icon-btn" id="themeBtn" aria-label="Theme">🌙</button>
</nav>

<header class="hero">
  <div class="hero-inner">
    <div>
      <span class="kicker" id="heroKicker"></span>
      <h1 id="heroTitle"></h1>
      <div class="rule"></div>
      <p class="lede" id="heroLede"></p>
      <div class="meta-row" id="heroMeta"></div>
    </div>
    <div class="calc" id="calc"></div>
  </div>
</header>

<div class="scrim" id="scrim"></div>
<button id="sbReopen" aria-label="Show contents"><span>▸</span><span id="sbReopenLbl">Contents</span></button>
<div class="shell">
  <aside id="sidebar">
    <div class="toc-tabs" id="tocTabs"></div>
    <div class="toc-h"><span id="tocHeading">Contents</span><button id="sbCollapse" aria-label="Collapse contents" title="Collapse">◂</button></div>
    <ul id="toc"></ul>
  </aside>
  <main><div class="doc" id="doc"><p id="loading">Loading…</p></div></main>
</div>

<button class="toTop" id="toTop">↑ <span id="toTopLbl">Top</span></button>
<footer id="footer"></footer>

<template id="calc-tpl">
  <div class="calc-head"><div class="eyebrow" id="cEye"></div><div class="ttl" id="cTtl"></div></div>
  <div class="calc-body">
    <div class="fields">
      <label data-k="price"><span></span><input type="number" id="c_price" value="34.99" step="0.01"></label>
      <label data-k="cogs"><span></span><input type="number" id="c_cogs" value="9" step="0.01"></label>
      <label data-k="ship"><span></span><input type="number" id="c_ship" value="3" step="0.01"></label>
      <label data-k="fee"><span></span><input type="number" id="c_fee" value="3" step="0.1"></label>
      <label data-k="cpa"><span></span><input type="number" id="c_cpa" value="15" step="0.01"></label>
      <label data-k="ref"><span></span><input type="number" id="c_ref" value="5" step="0.1"></label>
    </div>
    <div class="readout">
      <div class="cell"><div class="lbl" data-k="landed"></div><div class="num" id="o_landed">—</div></div>
      <div class="cell"><div class="lbl" data-k="gross"></div><div class="num" id="o_gross">—</div></div>
      <div class="cell"><div class="lbl" data-k="broas"></div><div class="num" id="o_broas">—</div></div>
      <div class="cell"><div class="lbl" data-k="mult"></div><div class="num" id="o_mult">—</div></div>
      <div class="cell"><div class="lbl" data-k="minp"></div><div class="num" id="o_minp">—</div></div>
      <div class="cell wide" id="o_net_card"><div><div class="lbl" data-k="net"></div><div class="num" id="o_net">—</div></div></div>
    </div>
    <div class="verdict ok" id="o_verdict">—</div>
  </div>
</template>

<script src="marked.min.js"></script>
<script>
const I18N = {
  en:{ htmllang:"en", tabs:{guide:"Guide",validation:"Validation",agent:"AI Agent"},
    search:"Filter contents…", contents:"Contents", top:"Top",
    heroKicker:"The number that decides everything",
    heroTitle:["Before you spend ","€1"," on ads, this is the math."],
    heroLede:"Dropshipping is a thin-margin marketing business — most stores lose money. Run the brutal unit economics first, so you don't.",
    heroMeta:["Spain tax included","Live calculator","No hype"],
    cEye:"Reality check", cTtl:"Unit economics, per order",
    f:{price:"Selling price (€, ex-VAT)",cogs:"Product cost (€)",ship:"Supplier shipping (€)",fee:"Payment fee (%)",cpa:"CPA — ad cost / sale (€)",ref:"Refund reserve (%)"},
    o:{landed:"Landed cost",gross:"Gross profit / order",broas:"Break-even ROAS",mult:"Markup",minp:"Min price (3×)",net:"Net contribution / order"},
    vOk:(net,br)=>`✅ Viable: €${net} net/order. Need ROAS above ${br} to break even; target ${(br*1.25).toFixed(2)}+ for real profit.`,
    vThin:(m)=>`⚠️ Positive but thin — markup only ${m}× (aim 3×+). One bad ad day wipes it out.`,
    vBad:(loss,cap)=>`❌ Losing €${loss}/order at this CPA. Cut product cost, raise price, or get CPA below €${cap}.`,
    footer:"Personal operating manual · educational, not financial/legal/tax advice · verify with a gestor",
    updated:"Updated" },
  es:{ htmllang:"es", tabs:{guide:"Guía",validation:"Validación",agent:"Agente IA"},
    search:"Filtrar contenido…", contents:"Contenido", top:"Arriba",
    heroKicker:"El número que lo decide todo",
    heroTitle:["Antes de gastar ","1€"," en anuncios, estas son las cuentas."],
    heroLede:"El dropshipping es un negocio de marketing con márgenes finos: la mayoría de tiendas pierden dinero. Haz primero las cuentas sin piedad, para que tú no pierdas.",
    heroMeta:["Fiscalidad España incluida","Calculadora en vivo","Sin humo"],
    cEye:"Baño de realidad", cTtl:"Economía unitaria, por pedido",
    f:{price:"Precio de venta (€, sin IVA)",cogs:"Coste del producto (€)",ship:"Envío del proveedor (€)",fee:"Comisión de pago (%)",cpa:"CPA — coste por venta (€)",ref:"Reserva devoluciones (%)"},
    o:{landed:"Coste unitario total",gross:"Beneficio bruto / pedido",broas:"ROAS de equilibrio",mult:"Markup",minp:"Precio mín. (3×)",net:"Contribución neta / pedido"},
    vOk:(net,br)=>`✅ Viable: €${net} neto/pedido. Necesitas ROAS por encima de ${br} para no perder; objetivo ${(br*1.25).toFixed(2)}+ para beneficio real.`,
    vThin:(m)=>`⚠️ Positivo pero justo — markup solo ${m}× (busca 3×+). Un mal día de anuncios se lo come.`,
    vBad:(loss,cap)=>`❌ Pierdes €${loss}/pedido con este CPA. Baja el coste, sube el precio, o deja el CPA por debajo de €${cap}.`,
    footer:"Manual de operaciones personal · educativo, no asesoramiento financiero/legal/fiscal · confírmalo con un gestor",
    updated:"Actualizado" }
};
const DOCS = {
  guide:{en:"dropshipping-guide.md",es:"dropshipping-guide.es.md"},
  validation:{en:"product-validation-checklist.md",es:"product-validation-checklist.es.md"},
  agent:{en:"ai-agent-setup.md",es:"ai-agent-setup.es.md"}
};

let LANG = localStorage.getItem("ds-lang") || (navigator.language||"en").slice(0,2); if(!I18N[LANG]) LANG="en";
let DOC  = localStorage.getItem("ds-doc")  || "guide"; if(!DOCS[DOC]) DOC="guide";

/* theme */
const themeBtn=document.getElementById("themeBtn");
function setTheme(t){ document.documentElement.dataset.theme=t; localStorage.setItem("ds-theme",t); themeBtn.textContent=t==="dark"?"☀️":"🌙"; }
setTheme(localStorage.getItem("ds-theme") || (matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"));
themeBtn.onclick=()=> setTheme(document.documentElement.dataset.theme==="dark"?"light":"dark");

/* sidebar collapse — works on all widths */
const scrim=document.getElementById("scrim");
function setSidebar(open){ document.body.classList.toggle("sb-open",open); }
setSidebar(innerWidth>=820);  // default: open on desktop, closed on mobile
const toggleSb=()=> setSidebar(!document.body.classList.contains("sb-open"));
document.getElementById("hamb").onclick=toggleSb;          // mobile drawer
document.getElementById("sbCollapse").onclick=()=> setSidebar(false);  // collapse from within sidebar
document.getElementById("sbReopen").onclick=()=> setSidebar(true);     // reopen tab (desktop)
scrim.onclick=()=> setSidebar(false);

/* static text */
function paintStatic(){
  const t=I18N[LANG]; document.documentElement.lang=t.htmllang;
  document.getElementById("search").placeholder=t.search;
  document.getElementById("tocHeading").textContent=t.contents;
  document.getElementById("sbReopenLbl").textContent=t.contents;
  document.getElementById("toTopLbl").textContent=t.top;
  document.getElementById("heroKicker").textContent=t.heroKicker;
  const ht=t.heroTitle; document.getElementById("heroTitle").innerHTML=ht[0]+'<span class="num">'+ht[1]+'</span>'+ht[2];
  document.getElementById("heroLede").textContent=t.heroLede;
  document.getElementById("heroMeta").innerHTML=t.heroMeta.map(m=>'<span>▸ '+m+'</span>').join('');
  const mk=host=>{ host.innerHTML=""; Object.keys(DOCS).forEach(k=>{ const b=document.createElement("button");
    b.className="tab"+(k===DOC?" active":""); b.textContent=t.tabs[k]; b.dataset.doc=k;
    b.onclick=()=>{ DOC=k; localStorage.setItem("ds-doc",k); if(innerWidth<820) setSidebar(false); loadDoc(); paintStatic(); scrollTo({top:0}); };
    host.appendChild(b); }); };
  mk(document.getElementById("tabs")); mk(document.getElementById("tocTabs"));
  document.querySelectorAll("#lang button").forEach(b=> b.classList.toggle("on",b.dataset.lang===LANG));
  document.querySelectorAll('.fields label').forEach(l=> l.querySelector('span').textContent=t.f[l.dataset.k]);
  document.querySelectorAll('.readout .lbl').forEach(el=> el.textContent=t.o[el.dataset.k]);
  const ce=document.getElementById("cEye"), ct=document.getElementById("cTtl"); if(ce)ce.textContent=t.cEye; if(ct)ct.textContent=t.cTtl;
  if(window._calc) window._calc();
}
document.querySelectorAll("#lang button").forEach(b=> b.onclick=()=>{ LANG=b.dataset.lang; localStorage.setItem("ds-lang",LANG); paintStatic(); loadDoc(); });

/* calculator */
(function(){ document.getElementById("calc").appendChild(document.getElementById("calc-tpl").content.cloneNode(true));
  const $=id=>document.getElementById(id);
  const eur=n=>"€"+n.toLocaleString(LANG==="es"?"es-ES":"en-IE",{minimumFractionDigits:2,maximumFractionDigits:2});
  function calc(){ const t=I18N[LANG];
    const price=+$("c_price").value||0,cogs=+$("c_cogs").value||0,ship=+$("c_ship").value||0,fee=(+$("c_fee").value||0)/100,cpa=+$("c_cpa").value||0,ref=(+$("c_ref").value||0)/100;
    const landed=cogs+ship,feeAmt=price*fee,gross=price-landed-feeAmt,broas=gross>0?price/gross:Infinity,mult=landed>0?price/landed:0,refAmt=price*ref,net=gross-cpa-refAmt,minp=landed*3;
    $("o_landed").textContent=eur(landed); $("o_gross").textContent=eur(gross);
    $("o_broas").textContent=isFinite(broas)?broas.toFixed(2):"∞"; $("o_mult").textContent=mult.toFixed(2)+"×";
    $("o_minp").textContent=eur(minp); $("o_net").textContent=eur(net);
    const card=$("o_net_card"); card.classList.toggle("pos",net>0); card.classList.toggle("neg",net<=0);
    const v=$("o_verdict");
    if(net>0&&mult>=3){ v.className="verdict ok"; v.textContent=t.vOk(net.toFixed(2),isFinite(broas)?broas.toFixed(2):"∞"); }
    else if(net>0){ v.className="verdict bad"; v.textContent=t.vThin(mult.toFixed(2)); }
    else { v.className="verdict bad"; v.textContent=t.vBad(Math.abs(net).toFixed(2),(gross-refAmt).toFixed(2)); }
  }
  ["c_price","c_cogs","c_ship","c_fee","c_cpa","c_ref"].forEach(id=>$(id).addEventListener("input",calc));
  window._calc=calc;
})();

/* markdown + toc */
function slugify(s){ return s.toLowerCase().trim().replace(/[^\w\sáéíóúüñ-]/gi,"").replace(/\s+/g,"-"); }
let _obs=null;
function loadDoc(){
  const file=DOCS[DOC][LANG]||DOCS[DOC].en, doc=document.getElementById("doc"), toc=document.getElementById("toc");
  doc.innerHTML='<p id="loading">…</p>'; toc.innerHTML=""; if(_obs)_obs.disconnect();
  fetch(file).then(r=>{ if(!r.ok)throw new Error(r.status);
      const lm=r.headers.get("last-modified"); if(lm){ const d=new Date(lm),t=I18N[LANG];
        document.getElementById("footer").textContent=t.footer+"  ·  "+t.updated+" "+d.toLocaleDateString(LANG==="es"?"es-ES":"en-GB",{day:"numeric",month:"short",year:"numeric"}); }
      return r.text(); })
    .then(md=>{ marked.setOptions({gfm:true,breaks:false}); doc.innerHTML=marked.parse(md);
      const heads=doc.querySelectorAll("h2, h3"),used={};
      heads.forEach(h=>{ let id=slugify(h.textContent)||"s"; if(used[id])id+="-"+(++used[id]); else used[id]=1; h.id=id;
        const li=document.createElement("li"),a=document.createElement("a");
        a.href="#"+id; a.textContent=h.textContent; a.className=h.tagName==="H3"?"lvl3":"lvl2";
        a.onclick=()=>{ if(innerWidth<820) setSidebar(false); }; li.appendChild(a); toc.appendChild(li); });
      const links=[...toc.querySelectorAll("a")],map=new Map(links.map(a=>[a.getAttribute("href").slice(1),a]));
      _obs=new IntersectionObserver(es=>{ es.forEach(e=>{ if(e.isIntersecting){ links.forEach(l=>l.classList.remove("active")); const a=map.get(e.target.id); if(a){a.classList.add("active"); a.scrollIntoView({block:"nearest"});} } }); },{rootMargin:"-90px 0px -75% 0px"});
      heads.forEach(h=>_obs.observe(h));
    })
    .catch(err=>{ doc.innerHTML=`<div class="err"><strong>Could not load ${file}.</strong><br>On GitHub Pages this works automatically. Opened from disk (file://)? Browsers block local fetch — run <code>python3 -m http.server</code> and open <code>http://localhost:8000</code>. (Error: ${err.message})</div>`; });
}
document.getElementById("search").addEventListener("input",e=>{ const q=e.target.value.toLowerCase();
  document.querySelectorAll("#toc a").forEach(a=> a.parentElement.style.display=a.textContent.toLowerCase().includes(q)?"":"none"); });

const toTop=document.getElementById("toTop");
addEventListener("scroll",()=> toTop.classList.toggle("show",scrollY>500),{passive:true});
toTop.onclick=()=> scrollTo({top:0,behavior:"smooth"});

paintStatic(); loadDoc();
</script>
</body>
</html>
