<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dropshipping Guide — No-Bullshit Starter</title>
<meta name="description" content="A no-bullshit dropshipping starter guide with Spain-specific tax detail, a live P&L calculator, tool setup and resources." />
<style>
  :root {
    --bg: #ffffff; --fg: #1a1d24; --muted: #5b6472; --border: #e3e7ee;
    --card: #f7f9fc; --accent: #2563eb; --accent-soft: #dbeafe;
    --warn-bg: #fff7ed; --warn-border: #fdba74; --warn-fg: #9a3412;
    --ok-bg: #ecfdf5; --ok-border: #6ee7b7; --code-bg: #f3f4f6;
    --sidebar-w: 300px;
  }
  html[data-theme="dark"] {
    --bg: #0e1117; --fg: #e6edf3; --muted: #9aa6b2; --border: #283039;
    --card: #161b22; --accent: #58a6ff; --accent-soft: #14283f;
    --warn-bg: #2b1d12; --warn-border: #8a5a2b; --warn-fg: #f0b27a;
    --ok-bg: #11231b; --ok-border: #2f6f4f; --code-bg: #161b22;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Layout */
  .wrap { display: flex; max-width: 1280px; margin: 0 auto; }
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0; position: sticky; top: 0; height: 100vh;
    overflow-y: auto; border-right: 1px solid var(--border); padding: 20px 16px 60px;
  }
  #sidebar h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 18px 0 8px; }
  #toc { list-style: none; margin: 0; padding: 0; font-size: 14px; }
  #toc li { margin: 1px 0; }
  #toc a { display: block; padding: 4px 8px; border-radius: 6px; color: var(--fg); }
  #toc a:hover { background: var(--card); text-decoration: none; }
  #toc a.lvl3 { padding-left: 22px; font-size: 13px; color: var(--muted); }
  #toc a.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

  main { flex: 1; min-width: 0; padding: 28px 40px 120px; }
  .content { max-width: 820px; margin: 0 auto; }

  /* Topbar */
  .topbar {
    position: sticky; top: 0; z-index: 20; background: var(--bg);
    border-bottom: 1px solid var(--border); display: flex; align-items: center;
    gap: 12px; padding: 10px 0; margin-bottom: 24px;
  }
  .topbar .spacer { flex: 1; }
  .btn {
    background: var(--card); border: 1px solid var(--border); color: var(--fg);
    border-radius: 8px; padding: 7px 12px; font-size: 14px; cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); }
  #menuBtn { display: none; }
  #search {
    background: var(--card); border: 1px solid var(--border); color: var(--fg);
    border-radius: 8px; padding: 7px 12px; font-size: 14px; width: 220px;
  }

  /* Markdown content */
  .content h1 { font-size: 2rem; line-height: 1.2; margin: .2em 0 .4em; }
  .content h2 { font-size: 1.5rem; margin: 2em 0 .5em; padding-bottom: .3em; border-bottom: 1px solid var(--border); scroll-margin-top: 70px; }
  .content h3 { font-size: 1.2rem; margin: 1.6em 0 .4em; scroll-margin-top: 70px; }
  .content h4 { font-size: 1.05rem; margin: 1.3em 0 .3em; }
  .content p, .content li { color: var(--fg); }
  .content strong { font-weight: 700; }
  .content em { color: var(--muted); }
  .content hr { border: none; border-top: 1px solid var(--border); margin: 2.4em 0; }
  .content code {
    background: var(--code-bg); padding: .15em .4em; border-radius: 5px;
    font: .88em/1.4 "SF Mono", Menlo, Consolas, monospace;
  }
  .content pre {
    background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; overflow-x: auto;
  }
  .content pre code { background: none; padding: 0; }
  .content blockquote {
    margin: 1em 0; padding: 12px 16px; background: var(--warn-bg);
    border-left: 4px solid var(--warn-border); color: var(--warn-fg); border-radius: 6px;
  }
  .content blockquote p { color: var(--warn-fg); margin: .3em 0; }
  .content table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; margin: 1em 0; }
  .content th, .content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .content th { background: var(--card); }
  .content ul, .content ol { padding-left: 1.5em; }
  .content input[type="checkbox"] { margin-right: 6px; }

  /* Calculator widget */
  .calc {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px 22px; margin: 24px 0 8px;
  }
  .calc h3 { margin-top: 0; }
  .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
  .calc label { display: flex; flex-direction: column; font-size: 13px; color: var(--muted); gap: 4px; }
  .calc input {
    background: var(--bg); border: 1px solid var(--border); color: var(--fg);
    border-radius: 8px; padding: 8px 10px; font-size: 15px;
  }
  .calc-out { margin-top: 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .stat .k { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .stat .v { font-size: 1.35rem; font-weight: 700; margin-top: 2px; }
  .stat.good .v { color: #16a34a; }
  .stat.bad .v { color: #dc2626; }
  .verdict { margin-top: 14px; padding: 12px 14px; border-radius: 10px; font-weight: 600; }
  .verdict.good { background: var(--ok-bg); border: 1px solid var(--ok-border); }
  .verdict.bad { background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--warn-fg); }

  #loading { color: var(--muted); padding: 40px 0; }
  .err { background: var(--warn-bg); border: 1px solid var(--warn-border); color: var(--warn-fg); padding: 16px; border-radius: 10px; }

  /* Mobile */
  @media (max-width: 900px) {
    #sidebar {
      position: fixed; left: 0; top: 0; z-index: 50; background: var(--bg);
      transform: translateX(-100%); transition: transform .2s; box-shadow: 0 0 40px rgba(0,0,0,.3);
    }
    #sidebar.open { transform: translateX(0); }
    #menuBtn { display: inline-block; }
    main { padding: 20px 18px 100px; }
    #search { width: 130px; }
    .calc-grid, .calc-out { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <aside id="sidebar">
    <h2>Contents</h2>
    <ul id="toc"></ul>
  </aside>

  <main>
    <div class="topbar">
      <button class="btn" id="menuBtn" aria-label="Toggle menu">☰</button>
      <strong>Dropshipping Guide</strong>
      <span class="spacer"></span>
      <input id="search" type="search" placeholder="Filter contents…" />
      <button class="btn" id="themeBtn" title="Toggle theme">🌙</button>
    </div>

    <div class="content">
      <div id="calc-mount"></div>
      <div id="doc"><p id="loading">Loading guide…</p></div>
    </div>
  </main>
</div>

<!-- Interactive unit-economics calculator template -->
<template id="calc-tpl">
  <div class="calc">
    <h3>⚡ Live Unit-Economics Calculator</h3>
    <p style="margin:.2em 0 1em;color:var(--muted);font-size:14px">
      Edit the inputs. Numbers update instantly. This is the math from Section 2 — know it before spending on ads.
    </p>
    <div class="calc-grid">
      <label>Selling price (€, ex-VAT)<input type="number" id="c_price" value="34.99" step="0.01"></label>
      <label>Product cost (€)<input type="number" id="c_cogs" value="9" step="0.01"></label>
      <label>Supplier shipping (€)<input type="number" id="c_ship" value="3" step="0.01"></label>
      <label>Payment fee (%)<input type="number" id="c_fee" value="3" step="0.1"></label>
      <label>CPA — ad cost per sale (€)<input type="number" id="c_cpa" value="15" step="0.01"></label>
      <label>Refund reserve (%)<input type="number" id="c_ref" value="5" step="0.1"></label>
    </div>
    <div class="calc-out">
      <div class="stat"><div class="k">Landed cost</div><div class="v" id="o_landed">—</div></div>
      <div class="stat"><div class="k">Gross profit / order</div><div class="v" id="o_gross">—</div></div>
      <div class="stat"><div class="k">Break-even ROAS</div><div class="v" id="o_broas">—</div></div>
      <div class="stat"><div class="k">Markup multiple</div><div class="v" id="o_mult">—</div></div>
      <div class="stat" id="o_net_card"><div class="k">Net contribution / order</div><div class="v" id="o_net">—</div></div>
      <div class="stat"><div class="k">Suggested min price (3×)</div><div class="v" id="o_minp">—</div></div>
    </div>
    <div class="verdict" id="o_verdict">—</div>
  </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const MD_FILE = "dropshipping-guide.md";

/* ---------- Theme ---------- */
const themeBtn = document.getElementById("themeBtn");
function setTheme(t){ document.documentElement.dataset.theme = t; localStorage.setItem("ds-theme", t); themeBtn.textContent = t === "dark" ? "☀️" : "🌙"; }
setTheme(localStorage.getItem("ds-theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
themeBtn.onclick = () => setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");

/* ---------- Mobile menu ---------- */
const sidebar = document.getElementById("sidebar");
document.getElementById("menuBtn").onclick = () => sidebar.classList.toggle("open");

/* ---------- Calculator ---------- */
function mountCalc(){
  const tpl = document.getElementById("calc-tpl").content.cloneNode(true);
  document.getElementById("calc-mount").appendChild(tpl);
  const $ = id => document.getElementById(id);
  const eur = n => "€" + n.toLocaleString("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2});
  function calc(){
    const price=+$("c_price").value||0, cogs=+$("c_cogs").value||0, ship=+$("c_ship").value||0,
          fee=(+$("c_fee").value||0)/100, cpa=+$("c_cpa").value||0, ref=(+$("c_ref").value||0)/100;
    const landed=cogs+ship, feeAmt=price*fee, gross=price-landed-feeAmt,
          broas=gross>0?price/gross:Infinity, mult=landed>0?price/landed:0,
          refAmt=price*ref, net=gross-cpa-refAmt, minp=landed*3;
    $("o_landed").textContent=eur(landed);
    $("o_gross").textContent=eur(gross);
    $("o_broas").textContent=isFinite(broas)?broas.toFixed(2):"∞";
    $("o_mult").textContent=mult.toFixed(2)+"×";
    $("o_net").textContent=eur(net);
    $("o_minp").textContent=eur(minp);
    const netCard=$("o_net_card");
    netCard.classList.toggle("good",net>0); netCard.classList.toggle("bad",net<=0);
    const v=$("o_verdict");
    if(net>0 && mult>=3){ v.className="verdict good"; v.textContent=`✅ Viable: €${net.toFixed(2)} net/order. You need ROAS above ${broas.toFixed(2)} to not lose money on ads; target ${(broas*1.25).toFixed(2)}+ for real profit.`; }
    else if(net>0){ v.className="verdict bad"; v.textContent=`⚠️ Positive but thin — markup is only ${mult.toFixed(2)}× (aim 3×+). One bad ad day wipes this out.`; }
    else { v.className="verdict bad"; v.textContent=`❌ Losing €${Math.abs(net).toFixed(2)}/order at this CPA. Lower product cost, raise price, or cut CPA below €${(gross-refAmt).toFixed(2)}.`; }
  }
  ["c_price","c_cogs","c_ship","c_fee","c_cpa","c_ref"].forEach(id=>$(id).addEventListener("input",calc));
  calc();
}

/* ---------- Render markdown + build TOC ---------- */
function slugify(s){ return s.toLowerCase().trim().replace(/[^\w\s-]/g,"").replace(/\s+/g,"-"); }

function render(md){
  const doc = document.getElementById("doc");
  marked.setOptions({ gfm:true, breaks:false });
  doc.innerHTML = marked.parse(md);

  // headings -> ids + TOC
  const toc = document.getElementById("toc");
  const heads = doc.querySelectorAll("h2, h3");
  const used = {};
  heads.forEach(h=>{
    let id = slugify(h.textContent); if(used[id]) id += "-" + (++used[id]); else used[id]=1;
    h.id = id;
    const li=document.createElement("li");
    const a=document.createElement("a");
    a.href="#"+id; a.textContent=h.textContent; a.className = h.tagName==="H3"?"lvl3":"lvl2";
    a.onclick=()=>sidebar.classList.remove("open");
    li.appendChild(a); toc.appendChild(li);
  });

  // scrollspy
  const links=[...toc.querySelectorAll("a")];
  const map=new Map(links.map(a=>[a.getAttribute("href").slice(1),a]));
  const obs=new IntersectionObserver(es=>{
    es.forEach(e=>{ if(e.isIntersecting){ links.forEach(l=>l.classList.remove("active")); const a=map.get(e.target.id); if(a){a.classList.add("active"); a.scrollIntoView({block:"nearest"});} }});
  },{rootMargin:"-70px 0px -75% 0px"});
  heads.forEach(h=>obs.observe(h));

  // search filter
  document.getElementById("search").addEventListener("input",e=>{
    const q=e.target.value.toLowerCase();
    links.forEach(a=>{ a.parentElement.style.display = a.textContent.toLowerCase().includes(q)?"":"none"; });
  });

  mountCalc();
}

fetch(MD_FILE)
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.text(); })
  .then(render)
  .catch(err=>{
    document.getElementById("doc").innerHTML =
      `<div class="err"><strong>Could not load ${MD_FILE}.</strong><br>
       On GitHub Pages this works automatically. If you opened this file directly from disk (file://),
       browsers block local fetch — run a tiny server instead:<br><br>
       <code>python3 -m http.server</code> then open <code>http://localhost:8000</code>.<br><br>
       (Error: ${err.message})</div>`;
    mountCalc();
  });
</script>
</body>
</html>
