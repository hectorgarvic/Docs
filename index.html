<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dropship · Ops Manual</title>
<meta name="description" content="A no-bullshit dropshipping operating manual — Spain tax detail, a live unit-economics console, product validation and tools. EN / ES." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%A6%3C/text%3E%3C/svg%3E" />
<style>
  /* ============ DESIGN TOKENS — "Operator's Console" ============ */
  :root {
    --ink:        #0a0e14;   /* deep ink background */
    --panel:      #11161f;   /* raised surface */
    --panel-2:    #161d28;   /* nested surface */
    --line:       #232c3a;   /* hairlines */
    --line-soft:  #1a212c;
    --fg:         #e8edf4;
    --muted:      #8794a6;
    --faint:      #5d6878;
    --profit:     #34d8a0;   /* measured teal-green = money/positive */
    --profit-dim: #123026;
    --warn:       #f0a93b;   /* amber = risk */
    --warn-dim:   #2a2012;
    --loss:       #ff6b5e;   /* red = losing money */
    --loss-dim:   #2c1614;
    --accent:     #34d8a0;
    --accent-ink: #0a0e14;
    --code-bg:    #0d1219;
    --radius:     14px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
    --nav-h: 58px;
    --sidebar-w: 290px;
  }
  html[data-theme="light"] {
    --ink:        #f6f8fb;
    --panel:      #ffffff;
    --panel-2:    #f1f5f9;
    --line:       #dde4ec;
    --line-soft:  #e7edf3;
    --fg:         #0d1626;
    --muted:      #5a6675;
    --faint:      #8a96a6;
    --profit:     #0f9e72;
    --profit-dim: #e2f7ee;
    --warn:       #b9740a;
    --warn-dim:   #fdf2e0;
    --loss:       #d23b30;
    --loss-dim:   #fdeceb;
    --accent:     #0f9e72;
    --accent-ink: #ffffff;
    --code-bg:    #0d1219;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } *{ transition: none !important; animation: none !important; } }
  body {
    margin: 0; background: var(--ink); color: var(--fg);
    font: 16px/1.68 var(--sans); -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  ::selection { background: var(--profit); color: var(--accent-ink); }
  :focus-visible { outline: 2px solid var(--profit); outline-offset: 2px; border-radius: 4px; }

  .mono { font-family: var(--mono); }
  .kicker {
    font-family: var(--mono); font-size: 11.5px; letter-spacing: .22em;
    text-transform: uppercase; color: var(--muted);
  }

  /* ============ NAVBAR ============ */
  .nav {
    position: sticky; top: 0; z-index: 100; height: var(--nav-h);
    display: flex; align-items: center; gap: 18px; padding: 0 22px;
    background: color-mix(in srgb, var(--ink) 82%, transparent);
    backdrop-filter: blur(14px) saturate(1.2);
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: -.01em; white-space: nowrap; }
  .brand .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--profit); box-shadow: 0 0 12px var(--profit); }
  .brand small { font-family: var(--mono); font-weight: 500; font-size: 10.5px; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; }
  .nav .tabs { display: flex; gap: 2px; margin-left: 8px; }
  .nav .tab {
    font-family: var(--mono); font-size: 12.5px; letter-spacing: .04em; color: var(--muted);
    padding: 7px 12px; border-radius: 9px; cursor: pointer; background: none; border: 1px solid transparent;
    text-transform: uppercase;
  }
  .nav .tab:hover { color: var(--fg); background: var(--panel); }
  .nav .tab.active { color: var(--accent-ink); background: var(--profit); border-color: var(--profit); font-weight: 600; }
  html[data-theme="light"] .nav .tab.active { color: #fff; }
  .nav .spacer { flex: 1; }
  .nav-search {
    background: var(--panel); border: 1px solid var(--line); color: var(--fg);
    border-radius: 9px; padding: 7px 11px; font-size: 13px; width: 180px; font-family: var(--sans);
  }
  .nav-search::placeholder { color: var(--faint); }
  .seg {
    display: inline-flex; background: var(--panel); border: 1px solid var(--line); border-radius: 9px; overflow: hidden;
  }
  .seg button {
    font-family: var(--mono); font-size: 12px; letter-spacing: .05em; padding: 7px 10px; border: none;
    background: none; color: var(--muted); cursor: pointer;
  }
  .seg button.on { background: var(--profit); color: var(--accent-ink); font-weight: 700; }
  html[data-theme="light"] .seg button.on { color: #fff; }
  .icon-btn {
    background: var(--panel); border: 1px solid var(--line); color: var(--fg);
    width: 36px; height: 34px; border-radius: 9px; cursor: pointer; font-size: 15px; line-height: 1;
  }
  .icon-btn:hover { border-color: var(--profit); }
  #menuBtn { display: none; }

  /* scroll progress */
  .progress { position: fixed; top: var(--nav-h); left: 0; height: 2px; width: 0; background: var(--profit); z-index: 99; box-shadow: 0 0 10px var(--profit); }

  /* ============ HERO ============ */
  .hero {
    position: relative; overflow: hidden;
    border-bottom: 1px solid var(--line);
    background:
      radial-gradient(1200px 400px at 80% -10%, color-mix(in srgb, var(--profit) 14%, transparent), transparent 60%),
      radial-gradient(900px 360px at 0% 0%, color-mix(in srgb, var(--warn) 8%, transparent), transparent 55%);
  }
  .hero-inner { max-width: 1180px; margin: 0 auto; padding: 46px 26px 38px; display: grid; grid-template-columns: 1.05fr .95fr; gap: 38px; align-items: center; }
  .hero h1 { font-size: clamp(2rem, 4.2vw, 3.1rem); line-height: 1.03; letter-spacing: -.025em; margin: 14px 0 14px; font-weight: 800; }
  .hero h1 .hl { color: var(--profit); }
  .hero p.lede { color: var(--muted); font-size: 1.06rem; max-width: 46ch; margin: 0 0 20px; }
  .hero .meta-row { display: flex; gap: 18px; flex-wrap: wrap; font-family: var(--mono); font-size: 11.5px; color: var(--faint); letter-spacing: .04em; }
  .hero .meta-row b { color: var(--profit); }

  /* ============ CALCULATOR CONSOLE (the signature) ============ */
  .console {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: 0 24px 60px -28px rgba(0,0,0,.7), inset 0 1px 0 color-mix(in srgb, var(--fg) 6%, transparent);
    overflow: hidden;
  }
  .console-head {
    display: flex; align-items: center; gap: 8px; padding: 11px 15px;
    border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--profit) 7%, transparent);
  }
  .console-head .led { width: 8px; height: 8px; border-radius: 50%; background: var(--profit); box-shadow: 0 0 8px var(--profit); }
  .console-head .ttl { font-family: var(--mono); font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--fg); }
  .console-body { padding: 16px 16px 18px; }
  .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
  .fields label { display: flex; flex-direction: column; gap: 4px; font-size: 11.5px; color: var(--muted); font-family: var(--mono); letter-spacing: .02em; }
  .fields input {
    background: var(--code-bg); border: 1px solid var(--line); color: var(--fg);
    border-radius: 8px; padding: 8px 10px; font-size: 15px; font-family: var(--mono); width: 100%;
  }
  html[data-theme="light"] .fields input { background: #fff; color: var(--fg); }
  .fields input:focus { border-color: var(--profit); }
  .readout { margin-top: 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cell { background: var(--code-bg); border: 1px solid var(--line); border-radius: 10px; padding: 9px 11px; }
  html[data-theme="light"] .cell { background: var(--panel-2); }
  .cell .lbl { font-family: var(--mono); font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase; color: var(--faint); }
  .cell .num { font-family: var(--mono); font-size: 1.18rem; font-weight: 700; margin-top: 3px; letter-spacing: -.01em; }
  .cell.hero-cell { grid-column: span 3; display: flex; justify-content: space-between; align-items: center; }
  .cell.pos { border-color: color-mix(in srgb, var(--profit) 55%, var(--line)); background: var(--profit-dim); }
  .cell.pos .num { color: var(--profit); }
  .cell.neg { border-color: color-mix(in srgb, var(--loss) 55%, var(--line)); background: var(--loss-dim); }
  .cell.neg .num { color: var(--loss); }
  .verdict { margin-top: 12px; padding: 11px 13px; border-radius: 10px; font-size: 13.5px; font-weight: 600; line-height: 1.45; }
  .verdict.ok  { background: var(--profit-dim); border: 1px solid color-mix(in srgb, var(--profit) 45%, var(--line)); color: var(--profit); }
  .verdict.bad { background: var(--warn-dim);  border: 1px solid color-mix(in srgb, var(--warn) 45%, var(--line)); color: var(--warn); }

  /* ============ LAYOUT ============ */
  .shell { display: flex; max-width: 1180px; margin: 0 auto; }
  #sidebar {
    width: var(--sidebar-w); flex-shrink: 0; position: sticky; top: var(--nav-h);
    height: calc(100vh - var(--nav-h)); overflow-y: auto; padding: 24px 14px 80px; border-right: 1px solid var(--line);
  }
  #sidebar .toc-h { font-family: var(--mono); font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--faint); padding: 0 8px; margin-bottom: 10px; }
  #toc { list-style: none; margin: 0; padding: 0; font-size: 13.5px; }
  #toc a { display: block; padding: 5px 10px; border-radius: 8px; color: var(--muted); border-left: 2px solid transparent; }
  #toc a:hover { color: var(--fg); background: var(--panel); text-decoration: none; }
  #toc a.lvl3 { padding-left: 22px; font-size: 12.5px; }
  #toc a.active { color: var(--profit); border-left-color: var(--profit); background: color-mix(in srgb, var(--profit) 9%, transparent); font-weight: 600; }

  main { flex: 1; min-width: 0; padding: 30px 44px 120px; }
  .doc { max-width: 760px; }

  /* ============ MARKDOWN ============ */
  .doc h1 { font-size: 2rem; letter-spacing: -.02em; margin: 0 0 .5em; }
  .doc h2 {
    font-size: 1.5rem; letter-spacing: -.015em; margin: 2.2em 0 .6em; padding-top: .2em;
    scroll-margin-top: calc(var(--nav-h) + 14px); position: relative;
  }
  .doc h2::before { content: ""; display: block; width: 34px; height: 3px; background: var(--profit); border-radius: 2px; margin-bottom: .55em; }
  .doc h3 { font-size: 1.18rem; margin: 1.7em 0 .4em; scroll-margin-top: calc(var(--nav-h) + 14px); color: var(--fg); }
  .doc h4 { font-size: 1.03rem; margin: 1.3em 0 .3em; color: var(--muted); }
  .doc p, .doc li { color: var(--fg); }
  .doc strong { font-weight: 700; }
  .doc em { color: var(--muted); font-style: italic; }
  .doc a { border-bottom: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); }
  .doc hr { border: none; border-top: 1px solid var(--line); margin: 2.6em 0; }
  .doc code { font-family: var(--mono); font-size: .86em; background: var(--code-bg); color: #e7eef7; padding: .14em .42em; border-radius: 5px; border: 1px solid var(--line-soft); }
  html[data-theme="light"] .doc code { background: var(--panel-2); color: var(--fg); }
  .doc pre { background: var(--code-bg); border: 1px solid var(--line); border-radius: 12px; padding: 15px 17px; overflow-x: auto; }
  .doc pre code { background: none; border: none; padding: 0; color: #d7e2ee; font-size: .85rem; line-height: 1.6; }
  .doc blockquote {
    margin: 1.3em 0; padding: 13px 16px; background: var(--warn-dim);
    border-left: 3px solid var(--warn); border-radius: 8px;
  }
  .doc blockquote p { color: var(--warn); margin: .3em 0; }
  .doc blockquote strong { color: var(--warn); }
  .doc table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; margin: 1.3em 0; font-size: .93rem; }
  .doc th, .doc td { border: 1px solid var(--line); padding: 9px 13px; text-align: left; }
  .doc th { background: var(--panel); font-family: var(--mono); font-size: .8rem; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  .doc tr:nth-child(even) td { background: color-mix(in srgb, var(--panel) 50%, transparent); }
  .doc ul, .doc ol { padding-left: 1.4em; }
  .doc li { margin: .25em 0; }
  .doc li::marker { color: var(--profit); }
  .doc input[type="checkbox"] { accent-color: var(--profit); margin-right: 7px; }

  .toTop {
    position: fixed; right: 22px; bottom: 22px; z-index: 80;
    background: var(--profit); color: var(--accent-ink); border: none; border-radius: 11px;
    padding: 10px 13px; font-family: var(--mono); font-size: 12px; letter-spacing: .08em; cursor: pointer;
    box-shadow: 0 10px 30px -10px var(--profit); opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .toTop.show { opacity: 1; pointer-events: auto; }

  footer { border-top: 1px solid var(--line); padding: 26px; text-align: center; color: var(--faint); font-size: 12.5px; font-family: var(--mono); letter-spacing: .03em; }

  #loading { color: var(--muted); padding: 40px 0; font-family: var(--mono); }
  .err { background: var(--warn-dim); border: 1px solid var(--warn); color: var(--warn); padding: 16px; border-radius: 10px; }

  /* ============ MOBILE ============ */
  @media (max-width: 1000px) {
    .hero-inner { grid-template-columns: 1fr; gap: 26px; }
  }
  @media (max-width: 760px) {
    .nav { gap: 10px; padding: 0 14px; }
    .nav .tabs { display: none; }
    #menuBtn { display: inline-block; }
    .nav-search { display: none; }
    #sidebar {
      position: fixed; left: 0; top: var(--nav-h); z-index: 90; width: 280px; background: var(--ink);
      transform: translateX(-105%); transition: transform .22s; box-shadow: 0 0 50px rgba(0,0,0,.5);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar .toc-tabs { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
    main { padding: 22px 18px 100px; }
    .hero-inner { padding: 30px 18px 26px; }
    .fields, .readout { grid-template-columns: 1fr 1fr; }
    .cell.hero-cell { grid-column: span 2; }
  }
  /* mobile in-sidebar tab clones (hidden on desktop) */
  #sidebar .toc-tabs { display: none; }
</style>
</head>
<body>

<nav class="nav">
  <button class="icon-btn" id="menuBtn" aria-label="Menu">☰</button>
  <div class="brand"><span class="dot"></span> Dropship <small>Ops&nbsp;Manual</small></div>
  <div class="tabs" id="tabs"></div>
  <span class="spacer"></span>
  <input class="nav-search" id="search" type="search" />
  <div class="seg" id="lang">
    <button data-lang="en">EN</button><button data-lang="es">ES</button>
  </div>
  <button class="icon-btn" id="themeBtn" aria-label="Theme">🌙</button>
</nav>
<div class="progress" id="progress"></div>

<header class="hero">
  <div class="hero-inner">
    <div>
      <span class="kicker" id="heroKicker"></span>
      <h1 id="heroTitle"></h1>
      <p class="lede" id="heroLede"></p>
      <div class="meta-row" id="heroMeta"></div>
    </div>
    <div class="console" id="console"></div>
  </div>
</header>

<div class="shell">
  <aside id="sidebar">
    <div class="toc-tabs" id="tocTabs"></div>
    <div class="toc-h" id="tocHeading">Contents</div>
    <ul id="toc"></ul>
  </aside>
  <main>
    <div class="doc" id="doc"><p id="loading">Loading…</p></div>
  </main>
</div>

<button class="toTop" id="toTop">↑ <span id="toTopLbl">Top</span></button>
<footer id="footer"></footer>

<template id="console-tpl">
  <div class="console-head"><span class="led"></span><span class="ttl" id="cTtl"></span></div>
  <div class="console-body">
    <div class="fields">
      <label data-k="price"><span></span><input type="number" id="c_price" value="34.99" step="0.01"></label>
      <label data-k="cogs"><span></span><input type="number" id="c_cogs" value="9" step="0.01"></label>
      <label data-k="ship"><span></span><input type="number" id="c_ship" value="3" step="0.01"></label>
      <label data-k="fee"><span></span><input type="number" id="c_fee" value="3" step="0.1"></label>
      <label data-k="cpa"><span></span><input type="number" id="c_cpa" value="15" step="0.01"></label>
      <label data-k="ref"><span></span><input type="number" id="c_ref" value="5" step="0.1"></label>
    </div>
    <div class="readout">
      <div class="cell"><div class="lbl" data-k="landed"></div><div class="num" id="o_landed">—</div></div>
      <div class="cell"><div class="lbl" data-k="gross"></div><div class="num" id="o_gross">—</div></div>
      <div class="cell"><div class="lbl" data-k="broas"></div><div class="num" id="o_broas">—</div></div>
      <div class="cell"><div class="lbl" data-k="mult"></div><div class="num" id="o_mult">—</div></div>
      <div class="cell"><div class="lbl" data-k="minp"></div><div class="num" id="o_minp">—</div></div>
      <div class="cell hero-cell" id="o_net_card"><div><div class="lbl" data-k="net"></div><div class="num" id="o_net">—</div></div></div>
    </div>
    <div class="verdict ok" id="o_verdict">—</div>
  </div>
</template>

<script src="marked.min.js"></script>
<script>
/* ============ i18n ============ */
const I18N = {
  en: {
    htmllang:"en",
    tabs: { guide:"Guide", validation:"Validation", agent:"AI Agent" },
    search:"Filter contents…", contents:"Contents", top:"Top",
    heroKicker:"The number that decides everything",
    heroTitle:["Before you spend ", "€1", " on ads, this is the math."],
    heroLede:"Dropshipping is a thin-margin marketing business — most stores lose money. This console runs the brutal unit economics first, so you don't.",
    heroMeta:["Spain tax included","Live calculator","No hype"],
    cTtl:"Unit-economics reality check",
    f:{ price:"Selling price (€, ex-VAT)", cogs:"Product cost (€)", ship:"Supplier shipping (€)", fee:"Payment fee (%)", cpa:"CPA — ad cost / sale (€)", ref:"Refund reserve (%)" },
    o:{ landed:"Landed cost", gross:"Gross profit / order", broas:"Break-even ROAS", mult:"Markup", minp:"Min price (3×)", net:"Net contribution / order" },
    vOk:(net,br)=>`✅ Viable: €${net} net/order. Need ROAS above ${br} to break even; target ${(br*1.25).toFixed(2)}+ for real profit.`,
    vThin:(m)=>`⚠️ Positive but thin — markup only ${m}× (aim 3×+). One bad ad day wipes it out.`,
    vBad:(loss,cap)=>`❌ Losing €${loss}/order at this CPA. Cut product cost, raise price, or get CPA below €${cap}.`,
    footer:"Personal operating manual · educational, not financial/legal/tax advice · verify with a gestor",
    updated:"Updated"
  },
  es: {
    htmllang:"es",
    tabs: { guide:"Guía", validation:"Validación", agent:"Agente IA" },
    search:"Filtrar contenido…", contents:"Contenido", top:"Arriba",
    heroKicker:"El número que lo decide todo",
    heroTitle:["Antes de gastar ", "1€", " en anuncios, estas son las cuentas."],
    heroLede:"El dropshipping es un negocio de marketing con márgenes finos: la mayoría de tiendas pierden dinero. Esta consola calcula primero la economía unitaria sin piedad, para que tú no pierdas.",
    heroMeta:["Fiscalidad España incluida","Calculadora en vivo","Sin humo"],
    cTtl:"Comprobación de economía unitaria",
    f:{ price:"Precio de venta (€, sin IVA)", cogs:"Coste del producto (€)", ship:"Envío del proveedor (€)", fee:"Comisión de pago (%)", cpa:"CPA — coste por venta (€)", ref:"Reserva devoluciones (%)" },
    o:{ landed:"Coste unitario total", gross:"Beneficio bruto / pedido", broas:"ROAS de equilibrio", mult:"Markup", minp:"Precio mín. (3×)", net:"Contribución neta / pedido" },
    vOk:(net,br)=>`✅ Viable: €${net} neto/pedido. Necesitas ROAS por encima de ${br} para no perder; objetivo ${(br*1.25).toFixed(2)}+ para beneficio real.`,
    vThin:(m)=>`⚠️ Positivo pero justo — markup solo ${m}× (busca 3×+). Un mal día de anuncios se lo come.`,
    vBad:(loss,cap)=>`❌ Pierdes €${loss}/pedido con este CPA. Baja el coste, sube el precio, o deja el CPA por debajo de €${cap}.`,
    footer:"Manual de operaciones personal · educativo, no asesoramiento financiero/legal/fiscal · confírmalo con un gestor",
    updated:"Actualizado"
  }
};
const DOCS = {
  guide:      { en:"dropshipping-guide.md",            es:"dropshipping-guide.es.md" },
  validation: { en:"product-validation-checklist.md",  es:"product-validation-checklist.es.md" },
  agent:      { en:"ai-agent-setup.md",                es:"ai-agent-setup.es.md" }
};

let LANG = localStorage.getItem("ds-lang") || (navigator.language||"en").slice(0,2);
if(!I18N[LANG]) LANG = "en";
let DOC = localStorage.getItem("ds-doc") || "guide";
if(!DOCS[DOC]) DOC = "guide";

/* ============ Theme ============ */
const themeBtn = document.getElementById("themeBtn");
function setTheme(t){ document.documentElement.dataset.theme=t; localStorage.setItem("ds-theme",t); themeBtn.textContent = t==="light"?"🌙":"☀️"; }
setTheme(localStorage.getItem("ds-theme") || (matchMedia("(prefers-color-scheme: light)").matches?"light":"dark"));
themeBtn.onclick = ()=> setTheme(document.documentElement.dataset.theme==="light"?"dark":"light");

/* ============ Static UI text ============ */
function paintStatic(){
  const t = I18N[LANG];
  document.documentElement.lang = t.htmllang;
  document.getElementById("search").placeholder = t.search;
  document.getElementById("tocHeading").textContent = t.contents;
  document.getElementById("toTopLbl").textContent = t.top;
  document.getElementById("footer").textContent = t.footer;
  // hero
  document.getElementById("heroKicker").textContent = t.heroKicker;
  const ht = t.heroTitle;
  document.getElementById("heroTitle").innerHTML = ht[0]+'<span class="hl">'+ht[1]+'</span>'+ht[2];
  document.getElementById("heroLede").textContent = t.heroLede;
  document.getElementById("heroMeta").innerHTML = t.heroMeta.map(m=>'<span>▸ '+m+'</span>').join('');
  // tabs (desktop + mobile clone)
  const mk = (host)=>{ host.innerHTML=""; Object.keys(DOCS).forEach(k=>{
    const b=document.createElement("button"); b.className="tab"+(k===DOC?" active":""); b.textContent=t.tabs[k]; b.dataset.doc=k;
    b.onclick=()=>{ DOC=k; localStorage.setItem("ds-doc",k); document.getElementById("sidebar").classList.remove("open"); loadDoc(); paintStatic(); window.scrollTo({top:0}); };
    host.appendChild(b);
  }); };
  mk(document.getElementById("tabs"));
  const mt=document.getElementById("tocTabs"); mt.style.display="flex"; mk(mt);
  // lang seg
  document.querySelectorAll("#lang button").forEach(b=> b.classList.toggle("on", b.dataset.lang===LANG));
  // labels in console
  document.querySelectorAll('.fields label').forEach(l=> l.querySelector('span').textContent = t.f[l.dataset.k]);
  document.querySelectorAll('.readout .lbl').forEach(el=> el.textContent = t.o[el.dataset.k]);
  const ct=document.getElementById("cTtl"); if(ct) ct.textContent = t.cTtl;
  if(window._calc) window._calc();
}

document.querySelectorAll("#lang button").forEach(b=> b.onclick=()=>{ LANG=b.dataset.lang; localStorage.setItem("ds-lang",LANG); paintStatic(); loadDoc(); });
document.getElementById("menuBtn").onclick = ()=> document.getElementById("sidebar").classList.toggle("open");

/* ============ Calculator ============ */
(function mountCalc(){
  document.getElementById("console").appendChild(document.getElementById("console-tpl").content.cloneNode(true));
  const $=id=>document.getElementById(id);
  const eur=n=>"€"+n.toLocaleString(LANG==="es"?"es-ES":"en-IE",{minimumFractionDigits:2,maximumFractionDigits:2});
  function calc(){
    const t=I18N[LANG];
    const price=+$("c_price").value||0,cogs=+$("c_cogs").value||0,ship=+$("c_ship").value||0,
          fee=(+$("c_fee").value||0)/100,cpa=+$("c_cpa").value||0,ref=(+$("c_ref").value||0)/100;
    const landed=cogs+ship,feeAmt=price*fee,gross=price-landed-feeAmt,
          broas=gross>0?price/gross:Infinity,mult=landed>0?price/landed:0,
          refAmt=price*ref,net=gross-cpa-refAmt,minp=landed*3;
    $("o_landed").textContent=eur(landed);
    $("o_gross").textContent=eur(gross);
    $("o_broas").textContent=isFinite(broas)?broas.toFixed(2):"∞";
    $("o_mult").textContent=mult.toFixed(2)+"×";
    $("o_minp").textContent=eur(minp);
    $("o_net").textContent=eur(net);
    const card=$("o_net_card"); card.classList.toggle("pos",net>0); card.classList.toggle("neg",net<=0);
    const v=$("o_verdict");
    if(net>0&&mult>=3){ v.className="verdict ok"; v.textContent=t.vOk(net.toFixed(2),isFinite(broas)?broas.toFixed(2):"∞"); }
    else if(net>0){ v.className="verdict bad"; v.textContent=t.vThin(mult.toFixed(2)); }
    else { v.className="verdict bad"; v.textContent=t.vBad(Math.abs(net).toFixed(2),(gross-refAmt).toFixed(2)); }
  }
  ["c_price","c_cogs","c_ship","c_fee","c_cpa","c_ref"].forEach(id=>$(id).addEventListener("input",calc));
  window._calc=calc;
})();

/* ============ Markdown + TOC ============ */
function slugify(s){ return s.toLowerCase().trim().replace(/[^\w\sáéíóúüñ-]/gi,"").replace(/\s+/g,"-"); }
let _obs=null;
function loadDoc(){
  const file = DOCS[DOC][LANG] || DOCS[DOC].en;
  const doc=document.getElementById("doc"), toc=document.getElementById("toc");
  doc.innerHTML='<p id="loading">…</p>'; toc.innerHTML="";
  if(_obs) _obs.disconnect();
  fetch(file).then(r=>{ if(!r.ok) throw new Error(r.status);
      const lm=r.headers.get("last-modified");
      if(lm){ const d=new Date(lm); const t=I18N[LANG];
        document.getElementById("footer").textContent = t.footer+"  ·  "+t.updated+" "+d.toLocaleDateString(LANG==="es"?"es-ES":"en-GB",{day:"numeric",month:"short",year:"numeric"}); }
      return r.text();
    })
    .then(md=>{
      marked.setOptions({gfm:true,breaks:false});
      doc.innerHTML=marked.parse(md);
      const heads=doc.querySelectorAll("h2, h3"); const used={};
      heads.forEach(h=>{ let id=slugify(h.textContent)||"s"; if(used[id]) id+="-"+(++used[id]); else used[id]=1; h.id=id;
        const li=document.createElement("li"); const a=document.createElement("a");
        a.href="#"+id; a.textContent=h.textContent; a.className=h.tagName==="H3"?"lvl3":"lvl2";
        a.onclick=()=>document.getElementById("sidebar").classList.remove("open");
        li.appendChild(a); toc.appendChild(li);
      });
      const links=[...toc.querySelectorAll("a")], map=new Map(links.map(a=>[a.getAttribute("href").slice(1),a]));
      _obs=new IntersectionObserver(es=>{ es.forEach(e=>{ if(e.isIntersecting){ links.forEach(l=>l.classList.remove("active")); const a=map.get(e.target.id); if(a){a.classList.add("active"); a.scrollIntoView({block:"nearest"});} } }); },{rootMargin:"-90px 0px -75% 0px"});
      heads.forEach(h=>_obs.observe(h));
    })
    .catch(err=>{
      doc.innerHTML=`<div class="err"><strong>Could not load ${file}.</strong><br>
        On GitHub Pages this works automatically. Opened from disk (file://)? Browsers block local fetch — run
        <code>python3 -m http.server</code> and open <code>http://localhost:8000</code>. (Error: ${err.message})</div>`;
    });
}

/* search filter */
document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  document.querySelectorAll("#toc a").forEach(a=> a.parentElement.style.display=a.textContent.toLowerCase().includes(q)?"":"none");
});

/* progress + toTop */
const prog=document.getElementById("progress"), toTop=document.getElementById("toTop");
addEventListener("scroll",()=>{ const h=document.documentElement.scrollHeight-innerHeight; const p=h>0?scrollY/h:0;
  prog.style.width=(p*100)+"%"; toTop.classList.toggle("show",scrollY>500); },{passive:true});
toTop.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

/* boot */
paintStatic();
loadDoc();
</script>
